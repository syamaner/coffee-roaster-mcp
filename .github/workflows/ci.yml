name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . --group dev

      - name: Run tests with coverage
        run: |
          python -m pytest \
            --cov=coffee_roaster_mcp \
            --cov-report=term-missing:skip-covered \
            --cov-report=json:coverage.json \
            --cov-report=html:htmlcov

      - name: Write coverage summary
        if: always()
        run: |
          if [ -f coverage.json ]; then
            python .github/scripts/write_coverage_summary.py coverage.json --output "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Test Coverage"
              echo
              echo "Coverage output was not generated because the test step failed before writing coverage.json."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload HTML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-coverage-report
          path: htmlcov/
          if-no-files-found: ignore

      - name: Run lint
        run: python -m ruff check .

      - name: Run format check
        run: python -m ruff format --check .

      - name: Run typecheck
        run: python -m pyright --pythonpath "${pythonLocation}/bin/python"

      - name: Run CLI smoke checks
        run: |
          coffee-roaster-mcp --help
          coffee-roaster-mcp --version

  build-package:
    name: Build Package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . --group dev

      - name: Build distribution artifacts
        run: python -m build

      - name: Smoke install built wheel
        run: |
          python -m venv /tmp/coffee-roaster-mcp-wheel-smoke
          wheel="$(python - <<'PY'
          from pathlib import Path

          wheels = sorted(Path("dist").glob("coffee_roaster_mcp-*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"Expected exactly one built wheel, found {len(wheels)}")
          print(wheels[0])
          PY
          )"
          /tmp/coffee-roaster-mcp-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/coffee-roaster-mcp-wheel-smoke/bin/python -m pip install "$wheel"
          /tmp/coffee-roaster-mcp-wheel-smoke/bin/coffee-roaster-mcp --help
          /tmp/coffee-roaster-mcp-wheel-smoke/bin/coffee-roaster-mcp --version
          /tmp/coffee-roaster-mcp-wheel-smoke/bin/python -c "import os, tempfile; from coffee_roaster_mcp.config import load_config; tmp = tempfile.TemporaryDirectory(); os.chdir(tmp.name); c = load_config(environ={}); print(c.roaster.driver, c.first_crack.mode, c.first_crack.precision); tmp.cleanup()"

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
